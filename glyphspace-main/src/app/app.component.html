<app-menubar [totalCells]="grid.length" (addCanvas)="addCanvas()"> </app-menubar>

<div class="content-area">
  <div
    #canvasGrid
    class="grid"
    [style.gridTemplateColumns]="'repeat(' + cols + ', minmax(0, 1fr))'"
    [style.gridTemplateRows]="'repeat(' + rows + ', minmax(0, 1fr))'"
  >
    @for (cell of grid; track cell.id) {
      <glyph-canvas
        class="glyph-canvas"
        [class.maximized]="maximizedId === cell.id"
        [class.hidden]="maximizedId !== null && maximizedId !== cell.id"
        [id]="cell.id"
        [totalCells]="grid.length"
        [maximized]="maximizedId === cell.id"
        (toggleMaximize)="toggleMaximize(cell.id)"
      >
      </glyph-canvas>
    }
  </div>

  <app-sidebar></app-sidebar>
</div>

<!-- Global toast notifications -->
<app-toast></app-toast>

<!-- Study Taskbar -->
<app-taskbar></app-taskbar>
