<header class="menu-bar">
  <div class="menu-top-row">
    <!-- LEFT -->
    <div class="menu-left">
      <div class="logo">
        <img src="assets/images/glyph-flower.png" alt="Glyphspace logo" />
        <span class="title">GLYPHSPACE</span>
      </div>
    </div>

    <button class="hamburger" (click)="menuOpen = !menuOpen" aria-label="Toggle menu">
      <span class="material-icons">
        {{ menuOpen ? 'close' : 'menu' }}
      </span>
    </button>
  </div>

  <!-- COLLAPSIBLE -->
  <div class="menu-collapsible" [class.open]="menuOpen">
    <!-- CENTER -->
    <div class="menu-center">
      <!-- DATA -->
      <div class="data-control">
        <span class="label">Data</span>
        <div class="dataset-selector">
          <select [(ngModel)]="selectedDataset" (ngModelChange)="onDatasetSelect($event)">
            @for (entry of datasetEntries; track entry.name) {
              <option [value]="entry.name">{{ entry.name }}{{ entry.source !== 'local' ? ' (uploaded)' : '' }}</option>
            }
          </select>
          @if (isUserDataset(selectedDataset)) {
            <button class="delete-btn" (click)="onDeleteDataset(selectedDataset)" title="Delete this dataset">
              <span class="material-icons">delete_outline</span>
            </button>
          }
        </div>
      </div>

      <!-- UPLOAD / EXPORT -->
      <div class="icon-panel">
        <button (click)="upload()">
          <span class="material-icons">upload</span>
          <span class="btn-label">Upload</span>
        </button>

        <button (click)="download()">
          <span class="material-icons">download</span>
          <span class="btn-label">Export</span>
        </button>

        <button (click)="screenshot()" title="Save canvas as PNG">
          <span class="material-icons">photo_camera</span>
          <span class="btn-label">Screenshot</span>
        </button>
      </div>

      <!-- CANVAS -->
      <div class="canvas-control">
        <span class="label">Canvas</span>
        <button class="add-btn" (click)="addCanvas.emit()" [disabled]="totalCells >= 4">
          <span class="material-icons">add</span>
          <span class="btn-label">Add</span>
        </button>
        <button class="add-btn fit-btn" (click)="fitAll()" title="Fit all">
          <span class="material-icons">fullscreen</span>
          <span class="btn-label">Fit all</span>
        </button>
      </div>
    </div>
  </div>
</header>

@if (showWizard) {
  <div class="wizard-overlay">
    <app-preprocessing-wizard (wizardClose)="closePreprocessingWizard()"></app-preprocessing-wizard>
  </div>
}
