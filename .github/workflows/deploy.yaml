name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: glyphspace-main
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠️ Build Angular app
        run: npm run build -- --base-href=/glyphspace-main_28-08/ --configuration production

      - name: 📄 Create .nojekyll file
        run: echo > dist/glyphspace/browser/.nojekyll

      - name: 🏷️ Write build timestamp
        run: echo "$(date -u +%s)" > dist/glyphspace/browser/build-timestamp.txt

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./glyphspace-main/dist/glyphspace/browser/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
